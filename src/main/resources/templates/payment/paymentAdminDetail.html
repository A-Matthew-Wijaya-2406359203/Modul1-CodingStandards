<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Update Payment</title>
</head>
<body>
<h2>Update Payment Status</h2>
<p>Payment ID: <span th:text="${payment.id}"></span></p>
<p>Current Status: <span th:text="${payment.status}"></span></p>

<form th:action="@{/payment/admin/set-status/{id}(id=${payment.id})}" method="post">
    <select name="status">
        <option value="SUCCESS">SUCCESS</option>
        <option value="REJECTED">REJECTED</option>
    </select>
    <button type="submit">Update Status</button>
</form>
<br>
<a href="/payment/admin/list">Back to List</a>
</body>
</html>
